server {
    listen 80;
    server_name test-production-b686.up.railway.app;

    # Редирект на HTTPS с сохранением пути и квери-параметров
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name test-production-b686.up.railway.app;

    ssl_certificate /mnt/volume/public-key.pem;
    ssl_certificate_key /mnt/volume/key.pem;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_session_cache shared:SSL:10m;
	ssl_session_timeout 10m;
	ssl_session_tickets off;

    location / {
        default_type application/json;
        return 200 '{"status":"ok","message":"Hello from Railway!"}';
    }
}
