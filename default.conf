server {
    listen 80;
    server_name test-production-b686.up.railway.app;

    # Редирект на HTTPS с сохранением пути и квери-параметров
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name test-production-b686.up.railway.app;

    ssl_certificate /etc/ssl/mycert.pem;
    ssl_certificate_key /etc/ssl/mykey.pem;    

    # Railway управляет SSL автоматически, но добавляем рекомендуемые настройки TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';

    location / {
        default_type application/json;
        return 200 '{"status":"ok","message":"Hello from Railway!"}';
    }
}
