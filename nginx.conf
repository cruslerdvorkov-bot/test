user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    #access_log /var/log/nginx/access.log;
    #error_log /var/log/nginx/error.log;

    # Основной сервер (HTTPS)
    server {
        listen 443 ssl http2;
        server_name test-production-e806.up.railway.app;

        # Railway управляет SSL автоматически, но добавляем рекомендуемые настройки TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';

        # Заголовки для проксирования
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;

        # Отключаем стандартные обработчики ошибок Nginx
        proxy_intercept_errors off;

        # Проксируем запрос на целевой сервер
        location / {
            proxy_pass https://ch46404.tw1.ru/wp-json/tg/v1/webhook;

            # Перехватываем ошибки и отвечаем 200 OK
            proxy_intercept_errors on;
            error_page 404 =200 /ok;
            error_page 500 502 503 504 =200 /ok;
        }

        # Ответ для всех ошибок (Telegram получит 200 OK)
        location = /ok {
            default_type text/plain;
            return 200 "OK";
        }
    }

    # Перенаправление HTTP → HTTPS (опционально)
    server {
        listen 80;
        server_name test-production-e806.up.railway.app;
        return 301 https://$host$request_uri;
    }
}
