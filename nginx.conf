server {
    listen 80;
    server_name ch46404.tw1.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ch46404.tw1.ru;

    # Railway автоматически управляет SSL — эти строки НЕ нужны!
    # ssl_certificate /etc/ssl/certs/your_certificate.crt;
    # ssl_certificate_key /etc/ssl/private/your_private.key;

    # Настройки SSL (опционально, Railway сам обрабатывает)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';

    # Ваша логика пересылки
    location = /wp-json/tg/v1/webhook {
        default_type application/json;
        return 200 '{"status": "ok", "message": "Webhook received and forwarded"}';

        access_by_lua_block {
            local http = require "resty.http"
            local httpc = http.new()
            local res, err = httpc:request_uri(
                "https://ch46404.tw1.ru/wp-json/tg/v1/webhook",
                {
                    method = ngx.var.request_method,
                    headers = ngx.req.get_headers(),
                    body = ngx.req.get_body_data(),
                    keepalive_timeout = 60
                }
            )
            if not res then
                ngx.log(ngx.ERR, "Ошибка пересылки: ", err)
            end
        }
    }

    # Остальные маршруты
    location / {
        proxy_pass https://ch46404.tw1.ru;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
