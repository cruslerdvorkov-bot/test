# Основные события (коннекшены)
events {
    worker_connections 1024;  # Оптимальное значение для бесплатных тарифов
}

# Конфигурация HTTP
http {
    # Таймауты (важно для стабильности)
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout           60s;
    keepalive_timeout      75s;

    # Логирование (Render автоматически сохраняет логи в /var/log/nginx/)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Основной сервер (HTTP → HTTPS)
    server {
        listen 80;
        server_name reverse-proxy-nginx.onrender.com;  # Замените на ваш Render-домен

        # Переадресация HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl http2;
        server_name reverse-proxy-nginx.onrender.com;  # Замените на ваш Render-домен

        # SSL-сертификаты (Render автоматически предоставляет их через Let's Encrypt)
        #ssl_certificate     /etc/nginx/ssl/cert.pem;
        #ssl_certificate_key /etc/nginx/ssl/key.pem;
        #ssl_protocols       TLSv1.2 TLSv1.3;
        #ssl_ciphers         HIGH:!aNULL:!MD5;
        #ssl_prefer_server_ciphers on;

        # Логи
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log warn;

        # Переадресация на бэкенд (например, Node.js на порту 3000)
        location / {
            proxy_pass https://ch46404.tw1.ru/wp-json/tg/v1/webhook;  # Порт вашего приложения
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port  $server_port;

            # Опционально: добавьте эти заголовки, если бэкенд использует WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
        }

        # (Опционально) Статика: если у вас есть статические файлы
        # location /static/ {
        #     alias /usr/share/nginx/html/static/;
        #     expires 30d;
        #     add_header Cache-Control "public";
        # }

        # (Опционально) API или другие маршруты
        # location /api/ {
        #     proxy_pass http://localhost:3001/;
        #     ...
        # }
    }
}
